# Site settings
title: "Paribesh Ranabhat Resume Website"
description: "A resume website using Jekyll and GitHub Pages sites."

# Build settings
markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

# Resume settings
resume_avatar:                  "true"
resume_name:                    "Paribesh Ranabhat"
resume_title:                   "Junior Software Engineer at Unified Chargers Oy"

# used for the contact button in _layouts/resume.html
resume_contact_email:           "paribessh_sab@hotmail.com"

# the next two items are used for schema itemprops in _layouts/resume.html
resume_contact_telephone:       "(+358)400960068"
resume_contact_address:         "Juusintie 5 A 16, 02700, Kauniainen, Finland"

resume_header_contact_info:     "Juusintie 5 A 16, 02700, Kauniainen, Finland • (+358)400960068 • paribessh_sab@hotmail.com"
display_header_contact_info:    "false"

resume_header_intro: "<p>An adapted and responsible graduate student currently working as a junior software engineer in a startup company focused in developing intelligent and compact fast DC charging stations for electric vehicles in Finland.  
</p><p>During my degree, as a student in Helsinki Metropolia University of Applied Sciences, I successfully combined my studies with work and commitments showing myself to be self-motivated, organised and capable of working under pressure. I have a clear, logical mind with a practical approach to problem solving and drive to see things through to completion. I enjoy working on my own initiative or in a team. In a nutshell, I am reliable, trustworthy, hardworking and eager to learn and have a genuine interest in PR.
</p>"

# use "yes" to display the email contact button,
# "no" to display an "I'm not looking for work" message,
# or remove the resume_looking_for_work option entirely
# to leave blank
resume_looking_for_work:        "yes"

# Decide which sections to use
# comment out to hide
resume_section_experience:      true
resume_section_education:       true
resume_section_projects:        true
resume_section_skills:          true
#resume_section_recognition:     true
#resume_section_links:           true
#resume_section_associations:    true
# resume_section_interests:       true

# Resume social links
# uncomment the options you wish to display, and add your own URL
resume_social_links:
  resume_github_url:            "https://github.com/ranabhat"
  resume_twitter_url:           "http://twitter.com/bronepeace"
  resume_dribbble_url:          "https://dribbble.com/"
  # resume_facebook_url:          "insert Facebook URL here"
  resume_linkedin_url:          "https://www.linkedin.com/in/ranabhat"
  # resume_instagram_url:         "insert your Instagram URL here"
  resume_website_url:           "http://ranabhat.github.io"
  resume_medium_url:            "https://medium.com/@bronepeace"
resume_print_social_links:      true

# Design settings
resume_theme:                   default

