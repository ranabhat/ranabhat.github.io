# Site settings
title: "Paribesh Ranabhat Resume Website"
description: "A resume website using Jekyll and GitHub Pages sites."

# Build settings
markdown: kramdown
sass:
  sass_dir: _sass
  style: compressed

# Resume settings
resume_avatar:                  "true"
resume_name:                    "Paribesh Ranabhat"
resume_title:                   "Software Engineer at Unified Chargers Oy"

# used for the contact button in _layouts/resume.html
resume_contact_email:           "paribessh_sab@hotmail.com"

# the next two items are used for schema itemprops in _layouts/resume.html
resume_contact_telephone:       "(+358)00000000"
resume_contact_address:         "Juusintie 5 A 16, 02700, Kauniainen, Finland"

resume_header_contact_info:     "Juusintie 5 A 16, 02700, Kauniainen, Finland • (+358)00000000 • paribessh_sab@hotmail.com"
display_header_contact_info:    "false"

resume_header_intro: "<p>An adapted and responsible graduate student, currently working as a software engineer at Unified Chargers, a Finnish developer of compact DC charging stations for electric vehicles.</p><p>As part of my job, I spend ample time designing, coding, testing, bug fixing, monitoring, documenting involved in creating and maintaining core software application that offers effortless, safe and quality electric vehicle charging experience for our customers. </p><p>I write programs with Python, shell scripting to automate processes in microprocessor and the communication with microcontrollers and use AWS services such as IoT, IAM, DynamoDB, S3, Atlassian's Confluence, Jira (Kanban) and Git to perform day to day tasks.</p>"
# use "yes" to display the email contact button,
# "no" to display an "I'm not looking for work" message,
# or remove the resume_looking_for_work option entirely
# to leave blank
resume_looking_for_work:        "yes"

# Decide which sections to use
# comment out to hide
resume_section_experience:      true
resume_section_education:       true
resume_section_projects:        true
resume_section_skills:          true
#resume_section_recognition:     true
#resume_section_links:           true
#resume_section_associations:    true
# resume_section_interests:       true

# Resume social links
# uncomment the options you wish to display, and add your own URL
resume_social_links:
  resume_github_url:            "https://github.com/ranabhat"
  resume_twitter_url:           "http://twitter.com/bronepeace"
  resume_dribbble_url:          "https://dribbble.com/bronepeace"
  # resume_facebook_url:          "insert Facebook URL here"
  resume_linkedin_url:          "https://www.linkedin.com/in/ranabhat"
  # resume_instagram_url:         "insert your Instagram URL here"
  #resume_behance_url:           "https://www.behance.net/bronepeace"
  resume_website_url:           "http://ranabhat.github.io"
  resume_medium_url:            "https://medium.com/@bronepeace"
resume_print_social_links:      true

# Design settings
resume_theme:                   default

# Note: when editing locally, remember to restart
# your Jekyll server when you edit this file. Changes
# to _config.yml are only recognized when the server starts
# Serving
detach:                         false
#port:                           4000
host:                           0.0.0.0
