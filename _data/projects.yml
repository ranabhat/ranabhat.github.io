# jazznotes.io
- project: Innovation Project
  role:  Primary Developer
  duration: October, 2015 &mdash; April, 2016
  # url: "#"
  description: Designed and developed a learning platform prototype, a visual and interactive way to learn the basics of electric signals and waves without being in labs at the university, that resulted more than 400 students using the learning platform. The platform offers realistic scenarios which are simulated by the controller and software application, facilitates student to experiment how signals and waves behave in a real scenario. It includes a control unit, an Arduino based physical box that simulates basic lab equipment such as switches, buttons, and potentiometer, connected with a computer or laptop that includes an application built on Python programming language. Students, then with application opened and a control unit connected with a computer, can start learning signals, waves, and perform assignments in an interactive way.
